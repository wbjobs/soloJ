version: "3.9"

# ------------------------------------------------------------
# FPGA 远程烧录与在线调试平台 - Docker Compose 一键编排
#
# 使用方式:
#     docker compose up -d --build
#
# 暴露端口:
#   - 3000 : 前端 (Vite 开发模式, 生产建议用 Nginx 托管 dist)
#   - 5000 : 后端 (Flask)
#
# 说明:
#   - WebUSB 仅在浏览器侧可用, 容器内后端仅负责业务逻辑与代理.
#   - 若需让后端直连 USB 设备, 请使用 `privileged: true` 或
#     `devices: [/dev/bus/usb]` (Linux 宿主机).
# ------------------------------------------------------------

services:
  backend:
    build:
      context: ./backend
      dockerfile_inline: |
        FROM python:3.11-slim
        WORKDIR /app
        ENV PYTHONDONTWRITEBYTECODE=1 \
            PYTHONUNBUFFERED=1 \
            FLASK_APP=app.py \
            FLASK_RUN_HOST=0.0.0.0 \
            FLASK_RUN_PORT=5000
        RUN apt-get update \
            && apt-get install -y --no-install-recommends libusb-1.0-0 libudev1 \
            && rm -rf /var/lib/apt/lists/*
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY . .
        EXPOSE 5000
        CMD ["python", "app.py"]
    container_name: fpga-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///data/app.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-prod}
    volumes:
      - backend-data:/app/data
      # 如需让后端通过 pyusb 直接访问宿主机 USB (可选, Linux 生效)
      # - /dev/bus/usb:/dev/bus/usb
    networks:
      - fpga-net
    # privileged: true   # 开启后可直接操作宿主机 USB 设备

  frontend:
    build:
      context: ./frontend
      dockerfile_inline: |
        FROM node:18-alpine
        WORKDIR /app
        ENV HOST=0.0.0.0 \
            PORT=3000
        COPY package*.json ./
        RUN npm install --no-audit --no-fund
        COPY . .
        EXPOSE 3000
        CMD ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "3000"]
    container_name: fpga-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api/v1
      - VITE_WS_BASE_URL=ws://localhost:5000
    depends_on:
      - backend
    networks:
      - fpga-net

networks:
  fpga-net:
    driver: bridge

volumes:
  backend-data:
    driver: local
