server:
  port: 8080

spring:
  application:
    name: chaos-platform

  datasource:
    url: jdbc:h2:mem:chaosdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

chaos:
  platform:
    jwt:
      secret: chaos-platform-secret-key-2024
      expiration: 86400000

    consul:
      enabled: false
      host: localhost
      port: 8500

    etcd:
      enabled: false
      endpoints: http://localhost:2379

    experiment:
      default-timeout-seconds: 3600
      max-concurrent-experiments: 10

logging:
  level:
    com.chaos.platform: DEBUG
    de.codecentric: INFO
