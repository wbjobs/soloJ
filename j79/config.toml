gateway_id = "factory-gateway-001"
buffer_capacity = 10000
# 缓冲区溢出策略: Block(阻塞), DropOldest(丢弃最旧), DropNewest(丢弃最新)
buffer_overflow_strategy = "DropOldest"
stats_interval_secs = 60
log_level = "info"

# 数据压缩与加密配置
[crypto]
# 使用 --generate-key 参数生成密钥
encryption_key = "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2"
enable_compression = true
enable_encryption = true
# 压缩级别 1-9 (1=最快, 9=最高压缩率)
compression_level = 6

# Prometheus 监控配置
[metrics]
enabled = true
host = "0.0.0.0"
port = 9090

[[modbus]]
device_id = "plc-line-01"
host = "192.168.1.100"
port = 502
slave_id = 1
poll_interval_ms = 1000
reconnect_delay_ms = 5000
max_reconnect_attempts = 10

[[modbus.registers]]
address = 0
count = 10
data_type = "Int16"

[[modbus.registers]]
address = 100
count = 2
data_type = "Int32"

[[modbus.registers]]
address = 200
count = 4
data_type = "Float32"

[[modbus]]
device_id = "plc-line-02"
host = "192.168.1.101"
port = 502
slave_id = 2
poll_interval_ms = 500
reconnect_delay_ms = 5000

[[modbus.registers]]
address = 0
count = 20
data_type = "UInt16"

[[modbus.registers]]
address = 100
count = 4
data_type = "Int32"

[data_pusher]
server_url = "https://api.example.com/data"
api_key = "your-api-key-here"
batch_size = 100
push_interval_ms = 1000
max_retries = 3
retry_delay_ms = 2000
timeout_ms = 10000
