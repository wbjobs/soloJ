version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-subtitle_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-subtitle_pass}
      POSTGRES_DB: ${DB_NAME:-subtitle_alignment}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subtitle_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-subtitle_user}
      - DB_PASSWORD=${DB_PASSWORD:-subtitle_pass}
      - DB_NAME=${DB_NAME:-subtitle_alignment}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ALGORITHM_SERVICE_URL=http://algorithm:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./uploads:/app/uploads

  algorithm:
    build:
      context: ./algorithm
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-subtitle_user}:${DB_PASSWORD:-subtitle_pass}@postgres:5432/${DB_NAME:-subtitle_alignment}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./algorithm:/app
      - ./uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
