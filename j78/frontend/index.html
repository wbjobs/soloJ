<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>威胁情报知识图谱</title>
    <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e4e4e4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(15, 52, 96, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-bottom: 1px solid rgba(233, 69, 96, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 24px;
            color: #e94560;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header .subtitle {
            font-size: 14px;
            color: #a0a0a0;
        }

        .performance-indicator {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .perf-normal {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .perf-warning {
            background: rgba(241, 196, 15, 0.2);
            color: #f1c40f;
            border: 1px solid rgba(241, 196, 15, 0.3);
        }

        .perf-danger {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 400px;
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(233, 69, 96, 0.2);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #e94560;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e94560;
            display: inline-block;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 13px;
            color: #a0a0a0;
            font-weight: 500;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 8px;
            color: #e4e4e4;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            resize: vertical;
            transition: all 0.3s;
            max-height: 200px;
        }

        textarea:focus {
            outline: none;
            border-color: #e94560;
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.1);
        }

        textarea::placeholder {
            color: #666;
        }

        .char-count {
            font-size: 11px;
            color: #666;
            text-align: right;
        }

        .char-count.warning {
            color: #f1c40f;
        }

        .char-count.danger {
            color: #e74c3c;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #e4e4e4;
            border: 1px solid rgba(233, 69, 96, 0.3);
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(233, 69, 96, 0.2);
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-danger {
            background: rgba(220, 53, 69, 0.8);
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: rgba(220, 53, 69, 1);
        }

        .entities-display {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(233, 69, 96, 0.2);
            padding: 15px;
            border-radius: 8px;
        }

        .entity-section {
            margin-bottom: 15px;
        }

        .entity-section:last-child {
            margin-bottom: 0;
        }

        .entity-label {
            font-size: 12px;
            color: #a0a0a0;
            margin-bottom: 6px;
        }

        .entity-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .entity-tag {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .tag-ip {
            background: rgba(52, 152, 219, 0.2);
            color: #3498db;
            border: 1px solid rgba(52, 152, 219, 0.5);
        }

        .tag-domain {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.5);
        }

        .tag-organization {
            background: rgba(155, 89, 182, 0.2);
            color: #9b59b6;
            border: 1px solid rgba(155, 89, 182, 0.5);
        }

        .legend {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(233, 69, 96, 0.2);
            padding: 15px;
            border-radius: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .legend-item:last-child {
            margin-bottom: 0;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }

        .legend-ip {
            background: #3498db;
        }

        .legend-domain {
            background: #2ecc71;
        }

        .legend-organization {
            background: #9b59b6;
        }

        .graph-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #cy {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .graph-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .control-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(26, 26, 46, 0.9);
            border: 1px solid rgba(233, 69, 96, 0.3);
            color: #e4e4e4;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .control-btn:hover {
            background: #e94560;
            transform: scale(1.1);
        }

        .control-btn.active {
            background: #e94560;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.5);
        }

        .node-selection-panel {
            position: absolute;
            top: 80px;
            right: 20px;
            background: rgba(26, 26, 46, 0.95);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 8px;
            padding: 15px;
            width: 280px;
            z-index: 20;
            display: none;
        }

        .node-selection-panel.active {
            display: block;
        }

        .selection-title {
            font-size: 14px;
            font-weight: 600;
            color: #e94560;
            margin-bottom: 12px;
        }

        .selected-node {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 12px;
        }

        .selected-node.empty {
            color: #666;
            font-style: italic;
        }

        .selected-node-label {
            font-size: 11px;
            color: #a0a0a0;
            margin-bottom: 4px;
        }

        .selected-node-value {
            font-weight: 500;
            word-break: break-all;
        }

        .selection-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-small {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-small-primary {
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            color: white;
        }

        .btn-small-primary:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        .btn-small-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #e4e4e4;
            border: 1px solid rgba(233, 69, 96, 0.3);
        }

        .btn-small-secondary:hover:not(:disabled) {
            background: rgba(233, 69, 96, 0.2);
        }

        .btn-small:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .path-info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(46, 204, 113, 0.95);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            z-index: 30;
            display: none;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }

        .path-info.show {
            display: block;
        }

        .path-info.error {
            background: rgba(231, 76, 60, 0.95);
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 10px;
        }

        .message-success {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .message-error {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .message-warning {
            background: rgba(241, 196, 15, 0.2);
            color: #f1c40f;
            border: 1px solid rgba(241, 196, 15, 0.3);
        }

        .info-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(26, 26, 46, 0.9);
            border: 1px solid rgba(233, 69, 96, 0.2);
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            color: #a0a0a0;
            max-width: 320px;
            z-index: 10;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #e94560;
        }

        .stat-label {
            font-size: 11px;
            color: #a0a0a0;
        }

        .sample-texts {
            margin-top: 10px;
        }

        .sample-btn {
            display: block;
            width: 100%;
            padding: 8px 12px;
            margin-bottom: 6px;
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 6px;
            color: #e4e4e4;
            font-size: 12px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sample-btn:hover {
            background: rgba(233, 69, 96, 0.2);
        }

        .performance-settings {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(233, 69, 96, 0.2);
            padding: 12px;
            border-radius: 8px;
        }

        .perf-setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .perf-setting-row:last-child {
            margin-bottom: 0;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.2);
            transition: .3s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #e94560;
        }

        input:checked + .slider:before {
            transform: translateX(16px);
        }

        .progress-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26, 26, 46, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 100;
        }

        .progress-overlay.active {
            display: flex;
        }

        .progress-bar {
            width: 300px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            border-radius: 4px;
            transition: width 0.3s;
            width: 0%;
        }

        .progress-text {
            font-size: 14px;
            color: #a0a0a0;
            margin-top: 10px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(233, 69, 96, 0.5);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(233, 69, 96, 0.7);
        }

        .path-query {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(233, 69, 96, 0.2);
            padding: 12px;
            border-radius: 8px;
        }

        .path-query .form-group {
            margin-bottom: 8px;
        }

        .path-select {
            width: 100%;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 6px;
            color: #e4e4e4;
            font-size: 13px;
            cursor: pointer;
        }

        .path-select:focus {
            outline: none;
            border-color: #e94560;
        }

        .path-select option {
            background: #1a1a2e;
            color: #e4e4e4;
        }

        .path-result {
            margin-top: 8px;
            padding: 8px;
            border-radius: 6px;
            font-size: 12px;
        }

        .path-result-found {
            background: rgba(46, 204, 113, 0.15);
            border: 1px solid rgba(46, 204, 113, 0.3);
            color: #2ecc71;
        }

        .path-result-notfound {
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #e74c3c;
        }

        .btn-export {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
        }

        .btn-export:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>
            <span>🔍</span>
            威胁情报知识图谱
        </h1>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div class="performance-indicator perf-normal" id="perfIndicator">
                状态: 正常
            </div>
            <div class="subtitle">Threat Intelligence Knowledge Graph</div>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <div>
                <div class="section-title">情报输入</div>
                <div class="form-group">
                    <label for="threatText">输入威胁情报文本 <span style="color: #e74c3c;">(最大 100KB)</span></label>
                    <textarea id="threatText" maxlength="102400" placeholder="请输入非结构化的威胁情报文本..."></textarea>
                    <div class="char-count" id="charCount">0 / 102400</div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" id="extractBtn" onclick="extractEntities()">提取实体</button>
                    <button class="btn btn-secondary" id="buildBtn" onclick="buildGraph()">构建图谱</button>
                </div>
                <div id="message"></div>
            </div>

            <div class="sample-texts">
                <div class="section-title" style="font-size: 14px; border-bottom: 1px solid #e94560; padding-bottom: 5px;">示例文本</div>
                <button class="sample-btn" onclick="loadSample(1)">示例 1: APT 组织攻击</button>
                <button class="sample-btn" onclick="loadSample(2)">示例 2: 勒索软件攻击</button>
                <button class="sample-btn" onclick="loadSample(3)">示例 3: 复合攻击场景</button>
            </div>

            <div class="entities-display" id="entitiesDisplay" style="display: none;">
                <div class="section-title" style="font-size: 14px; border-bottom: 1px solid #e94560; padding-bottom: 5px;">提取的实体</div>
                
                <div class="entity-section">
                    <div class="entity-label">IP 地址</div>
                    <div class="entity-tags" id="ipTags"></div>
                </div>

                <div class="entity-section">
                    <div class="entity-label">域名</div>
                    <div class="entity-tags" id="domainTags"></div>
                </div>

                <div class="entity-section">
                    <div class="entity-label">攻击组织</div>
                    <div class="entity-tags" id="orgTags"></div>
                </div>
            </div>

            <div class="performance-settings">
                <div class="section-title" style="font-size: 14px; border-bottom: 1px solid #e94560; padding-bottom: 5px;">性能设置</div>
                <div class="perf-setting-row">
                    <span>显示边标签</span>
                    <label class="switch">
                        <input type="checkbox" id="showEdgeLabels" checked onchange="updateRenderSettings()">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="perf-setting-row">
                    <span>显示节点阴影</span>
                    <label class="switch">
                        <input type="checkbox" id="showNodeShadows" checked onchange="updateRenderSettings()">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="perf-setting-row">
                    <span>启用布局动画</span>
                    <label class="switch">
                        <input type="checkbox" id="enableAnimation" checked onchange="updateRenderSettings()">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="perf-setting-row">
                    <span>高性能模式 (自动)</span>
                    <label class="switch">
                        <input type="checkbox" id="autoPerfMode" checked onchange="updateRenderSettings()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="path-query">
                <div class="section-title" style="font-size: 14px; border-bottom: 1px solid #e94560; padding-bottom: 5px;">最短路径查询</div>
                <div class="form-group">
                    <label>起始节点</label>
                    <select class="path-select" id="sourceNode">
                        <option value="">-- 选择起始节点 --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>目标节点</label>
                    <select class="path-select" id="targetNode">
                        <option value="">-- 选择目标节点 --</option>
                    </select>
                </div>
                <div class="btn-group" style="margin-top: 8px;">
                    <button class="btn btn-primary" style="font-size: 12px; padding: 8px;" onclick="findShortestPath()">查询路径</button>
                    <button class="btn btn-secondary" style="font-size: 12px; padding: 8px;" onclick="clearPathHighlight()">清除高亮</button>
                </div>
                <div id="pathResult"></div>
            </div>

            <div class="btn-group">
                <button class="btn btn-danger" onclick="clearGraph()">清空图谱</button>
                <button class="btn btn-secondary" onclick="refreshGraph()">刷新图谱</button>
            </div>
            <div class="btn-group" style="margin-top: 10px;">
                <button class="btn btn-export" onclick="exportGexf()">导出 GEXF</button>
            </div>

            <div class="legend">
                <div class="section-title" style="font-size: 14px; border-bottom: 1px solid #e94560; padding-bottom: 5px;">图例说明</div>
                <div class="legend-item">
                    <div class="legend-color legend-ip"></div>
                    <span>IP 地址</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color legend-domain"></div>
                    <span>域名</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color legend-organization"></div>
                    <span>攻击组织</span>
                </div>
            </div>
        </div>

        <div class="graph-container">
            <div class="progress-overlay" id="progressOverlay">
                <div style="font-size: 18px; color: #e94560; font-weight: 600;">正在处理大量节点...</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">准备中...</div>
            </div>

            <div class="graph-controls">
                <button class="control-btn" onclick="zoomIn()" title="放大">+</button>
                <button class="control-btn" onclick="zoomOut()" title="缩小">-</button>
                <button class="control-btn" onclick="fitGraph()" title="适应窗口">⤢</button>
                <button class="control-btn" onclick="toggleLayout()" title="切换布局">⟳</button>
            </div>
            <div id="cy"></div>
            <div class="info-panel">
                <div style="color: #e94560; font-weight: 600; margin-bottom: 8px;">图谱统计</div>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value" id="nodeCount">0</div>
                        <div class="stat-label">节点数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="edgeCount">0</div>
                        <div class="stat-label">关系数</div>
                    </div>
                </div>
                <div style="margin-top: 10px; font-size: 11px;" id="perfTip">
                    💡 提示：拖拽节点可调整位置，滚轮缩放图谱
                </div>
            </div>
        </div>
    </div>

    <script>
        let cy;
        let currentLayout = 'cose';
        let lastExtractedEntities = null;
        let isRendering = false;
        let renderSettings = {
            showEdgeLabels: true,
            showNodeShadows: true,
            enableAnimation: true,
            autoPerfMode: true
        };

        const MAX_TEXT_LENGTH = 102400;
        const NODE_WARNING_THRESHOLD = 200;
        const NODE_DANGER_THRESHOLD = 500;
        const MAX_NODES = 2000;

        const sampleTexts = {

Lazarus Group，一个来自朝鲜的黑客组织，涉嫌对金融机构进行了多次攻击。他们使用IP 203.0.113.45、198.51.100.23和域名lazarus-attack.net、crypto-heist.org。

Sandworm Team，另一个俄罗斯黑客组织，在攻击活动中涉及IP 192.0.2.100、198.51.100.10和恶意软件Industroyer。

LockBit勒索软件团伙最近非常活跃，他们的基础设施包括IP 193.142.54.127、45.154.16.78和lockbit-ransom.com域名。

另外，Lapsus$团伙涉嫌使用域名lapsus-hack.com和IP 192.168.100.50攻击了多家科技公司，数据泄露到dark-web-leaks.com。

与此同时，发现域名phishing-docs.net解析到IP 185.220.101.46，该IP与多个恶意活动相关联。`

        function getCyStyles() {
            const baseNodeStyle = {
                'label': 'data(name)',
                'color': '#fff',
                'text-valign': 'center',
                'text-halign': 'center',
                'font-size': 11,
                'text-outline-width': 2,
                'border-width': 2,
                'border-opacity': 0.8,
                'min-zoomed-font-size': 8
            };

            const styles = [
                {
                    selector: 'node[type = "ip"]',
                    style: Object.assign({}, baseNodeStyle, {
                        'background-color': '#3498db',
                        'text-outline-color': '#2980b9',
                        'width': 35,
                        'height': 35,
                        'border-color': '#5dade2'
                    })
                },
                {
                    selector: 'node[type = "domain"]',
                    style: Object.assign({}, baseNodeStyle, {
                        'background-color': '#2ecc71',
                        'text-outline-color': '#27ae60',
                        'width': 35,
                        'height': 35,
                        'border-color': '#58d68d'
                    })
                },
                {
                    selector: 'node[type = "organization"]',
                    style: Object.assign({}, baseNodeStyle, {
                        'background-color': '#9b59b6',
                        'text-outline-color': '#8e44ad',
                        'width': 45,
                        'height': 45,
                        'border-color': '#bb8fce'
                    })
                },
                {
                    selector: 'edge',
                    style: {
                        'width': 1.5,
                        'line-color': '#e94560',
                        'target-arrow-color': '#e94560',
                        'target-arrow-shape': 'triangle',
                        'curve-style': 'haystack',
                        'opacity': 0.6,
                        'min-zoomed-font-size': 10
                    }
                },
                {
                    selector: 'node:selected',
                    style: {
                        'border-width': 4,
                        'border-color': '#f1c40f',
                        'z-index': 10
                    }
                },
                {
                    selector: 'edge:selected',
                    style: {
                        'line-color': '#f1c40f',
                        'target-arrow-color': '#f1c40f',
                        'width': 3,
                        'z-index': 10
                    }
                },
                {
                    selector: 'node.path-node',
                    style: {
                        'border-width': 4,
                        'border-color': '#f39c12',
                        'z-index': 20,
                        'opacity': 1.0
                    }
                },
                {
                    selector: 'edge.path-edge',
                    style: {
                        'line-color': '#f39c12',
                        'target-arrow-color': '#f39c12',
                        'width': 4,
                        'z-index': 20,
                        'opacity': 1.0
                    }
                }
            ];

            if (renderSettings.showEdgeLabels) {
                styles.push({
                    selector: 'edge',
                    style: {
                        'label': 'data(relationship)',
                        'text-rotation': 'autorotate',
                        'font-size': 9,
                        'color': '#a0a0a0',
                        'text-outline-width': 2,
                        'text-outline-color': '#1a1a2e',
                        'text-margin-y': -8
                    }
                });
            }

            if (renderSettings.showNodeShadows) {
                styles.push({
                    selector: 'node[type = "ip"]',
                    style: {
                        'shadow-blur': 8,
                        'shadow-color': 'rgba(52, 152, 219, 0.4)',
                        'shadow-opacity': 0.5
                    }
                });
                styles.push({
                    selector: 'node[type = "domain"]',
                    style: {
                        'shadow-blur': 8,
                        'shadow-color': 'rgba(46, 204, 113, 0.4)',
                        'shadow-opacity': 0.5
                    }
                });
                styles.push({
                    selector: 'node[type = "organization"]',
                    style: {
                        'shadow-blur': 12,
                        'shadow-color': 'rgba(155, 89, 182, 0.4)',
                        'shadow-opacity': 0.5
                    }
                });
            }

            return styles;
        }

        function initCytoscape() {
            cy = cytoscape({
                container: document.getElementById('cy'),
                style: getCyStyles(),
                elements: [],
                wheelSensitivity: 0.2,
                minZoom: 0.1,
                maxZoom: 5,
                userZoomingEnabled: true,
                userPanningEnabled: true,
                boxSelectionEnabled: false,
                selectionType: 'single',
                hideEdgesOnViewport: true,
                hideLabelsOnViewport: true,
                textureOnViewport: true,
                motionBlur: false
            });

            cy.on('dragfree', 'node', function(event) {
                const node = event.target;
                node.lock();
            });

            document.getElementById('threatText').addEventListener('input', updateCharCount);
        }

        function updateCharCount() {
            const textarea = document.getElementById('threatText');
            const charCount = document.getElementById('charCount');
            const length = textarea.value.length;
            
            charCount.textContent = length + ' / ' + MAX_TEXT_LENGTH;
            
            if (length > MAX_TEXT_LENGTH * 0.9) {
                charCount.className = 'char-count danger';
            } else if (length > MAX_TEXT_LENGTH * 0.7) {
                charCount.className = 'char-count warning';
            } else {
                charCount.className = 'char-count';
            }
        }

        function updatePerformanceIndicator(nodeCount, edgeCount) {
            const indicator = document.getElementById('perfIndicator');
            const perfTip = document.getElementById('perfTip');
            
            const totalElements = nodeCount + edgeCount;
            
            if (totalElements > NODE_DANGER_THRESHOLD * 2) {
                indicator.className = 'performance-indicator perf-danger';
                indicator.textContent = '状态: 高负载 (节点 ' + nodeCount + ')';
                perfTip.innerHTML = '⚠️  <span style="color: #e74c3c;">节点数量较多，建议关闭动画和边标签以提升性能</span>';
            } else if (totalElements > NODE_WARNING_THRESHOLD * 2) {
                indicator.className = 'performance-indicator perf-warning';
                indicator.textContent = '状态: 中负载 (节点 ' + nodeCount + ')';
                perfTip.innerHTML = '💡 节点数量较多，可关闭边标签以提升性能';
            } else {
                indicator.className = 'performance-indicator perf-normal';
                indicator.textContent = '状态: 正常';
                perfTip.innerHTML = '💡 提示：拖拽节点可调整位置，滚轮缩放图谱';
            }
        }

        function autoAdjustPerfSettings(nodeCount, edgeCount) {
            if (!renderSettings.autoPerfMode) return;
            
            const totalElements = nodeCount + edgeCount;
            
            if (totalElements > NODE_DANGER_THRESHOLD * 2) {
                renderSettings.showEdgeLabels = false;
                renderSettings.showNodeShadows = false;
                renderSettings.enableAnimation = false;
                document.getElementById('showEdgeLabels').checked = false;
                document.getElementById('showNodeShadows').checked = false;
                document.getElementById('enableAnimation').checked = false;
                showMessage('已自动切换到高性能模式以保证流畅运行', 'warning');
            } else if (totalElements > NODE_WARNING_THRESHOLD * 2) {
                renderSettings.showEdgeLabels = false;
                document.getElementById('showEdgeLabels').checked = false;
            }
            
            cy.style(getCyStyles());
        }

        function updateRenderSettings() {
            renderSettings.showEdgeLabels = document.getElementById('showEdgeLabels').checked;
            renderSettings.showNodeShadows = document.getElementById('showNodeShadows').checked;
            renderSettings.enableAnimation = document.getElementById('enableAnimation').checked;
            renderSettings.autoPerfMode = document.getElementById('autoPerfMode').checked;
            
            cy.style(getCyStyles());
        }

        function loadSample(num) {
            document.getElementById('threatText').value = sampleTexts[num];
            updateCharCount();
            showMessage('示例文本已加载', 'success');
        }

        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerHTML = '<div class="message message-' + type + '">' + text + '</div>';
            setTimeout(() => {
                msgDiv.innerHTML = '';
            }, 4000);
        }

        function showProgress(show, percent, text) {
            const overlay = document.getElementById('progressOverlay');
            const fill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            
            if (show) {
                overlay.classList.add('active');
                fill.style.width = percent + '%';
                progressText.textContent = text;
            } else {
                overlay.classList.remove('active');
            }
        }

        function showLoading(btnId, originalText) {
            const btn = document.getElementById(btnId);
            btn.innerHTML = '<span class="loading"></span>';
            btn.disabled = true;
        }

        function hideLoading(btnId, originalText) {
            const btn = document.getElementById(btnId);
            btn.innerHTML = originalText;
            btn.disabled = false;
        }

        async function extractEntities() {
            const text = document.getElementById('threatText').value.trim();
            
            if (!text) {
                showMessage('请输入威胁情报文本', 'error');
                return;
            }

            if (text.length > MAX_TEXT_LENGTH) {
                showMessage('文本过长，最大支持 ' + MAX_TEXT_LENGTH + ' 字符', 'error');
                return;
            }

            showLoading('extractBtn', '提取实体');

            try {
                const response = await fetch('/api/extract', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();

                if (data.success) {
                    lastExtractedEntities = data.entities;
                    displayEntities(data.entities);
                    showMessage('实体提取成功！IP: ' + data.entities.ips.length + 
                               ', 域名: ' + data.entities.domains.length + 
                               ', 组织: ' + data.entities.organizations.length, 'success');
                } else {
                    showMessage('提取失败: ' + data.error, 'error');
                }
            } catch (error) {
                showMessage('请求失败: ' + error.message, 'error');
            } finally {
                hideLoading('extractBtn', '提取实体');
            }
        }

        function displayEntities(entities) {
            const display = document.getElementById('entitiesDisplay');
            display.style.display = 'block';

            const ipTags = document.getElementById('ipTags');
            const domainTags = document.getElementById('domainTags');
            const orgTags = document.getElementById('orgTags');

            ipTags.innerHTML = entities.ips.length ? 
                entities.ips.map(function(ip) { return '<span class="entity-tag tag-ip">' + escapeHtml(ip) + '</span>'; }).join('') :
                '<span style="color: #666; font-size: 12px;">无</span>';

            domainTags.innerHTML = entities.domains.length ? 
                entities.domains.map(function(d) { return '<span class="entity-tag tag-domain">' + escapeHtml(d) + '</span>'; }).join('') :
                '<span style="color: #666; font-size: 12px;">无</span>';

            orgTags.innerHTML = entities.organizations.length ? 
                entities.organizations.map(function(o) { return '<span class="entity-tag tag-organization">' + escapeHtml(o) + '</span>'; }).join('') :
                '<span style="color: #666; font-size: 12px;">无</span>';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function buildGraph() {
            const text = document.getElementById('threatText').value.trim();
            
            if (!text) {
                showMessage('请输入威胁情报文本', 'error');
                return;
            }

            if (text.length > MAX_TEXT_LENGTH) {
                showMessage('文本过长，最大支持 ' + MAX_TEXT_LENGTH + ' 字符', 'error');
                return;
            }

            showLoading('buildBtn', '构建图谱');

            try {
                const response = await fetch('/api/build-graph', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();

                if (data.success) {
                    displayEntities(data.result.entities);
                    await refreshGraph();
                    showMessage('图谱构建成功！', 'success');
                } else {
                    showMessage('构建失败: ' + data.error, 'error');
                }
            } catch (error) {
                showMessage('请求失败: ' + error.message, 'error');
            } finally {
                hideLoading('buildBtn', '构建图谱');
            }
        }

        async function refreshGraph() {
            try {
                const response = await fetch('/api/graph');
                const data = await response.json();

                if (data.success) {
                    await renderGraph(data.data);
                }
            } catch (error) {
                showMessage('刷新图谱失败: ' + error.message, 'error');
            }
        }

        async function renderGraph(graphData) {
            if (isRendering) {
                showMessage('正在渲染中，请稍候...', 'warning');
                return;
            }

            const nodeCount = graphData.nodes.length;
            const edgeCount = graphData.edges.length;
            const totalElements = nodeCount + edgeCount;

            if (nodeCount > MAX_NODES) {
                showMessage('节点数量超过限制 (' + MAX_NODES + ')，已自动截断', 'warning');
                graphData.nodes = graphData.nodes.slice(0, MAX_NODES);
                const validNodeIds = new Set(graphData.nodes.map(function(n) { return n.id; }));
                graphData.edges = graphData.edges.filter(function(e) { 
                    return validNodeIds.has(e.source) && validNodeIds.has(e.target); 
                });
            }

            autoAdjustPerfSettings(nodeCount, edgeCount);
            updatePerformanceIndicator(nodeCount, edgeCount);

            if (totalElements > NODE_WARNING_THRESHOLD * 2) {
                showProgress(true, 10, '准备数据...');
                isRendering = true;
                
                try {
                    await renderLargeGraph(graphData);
                } finally {
                    isRendering = false;
                    showProgress(false, 100, '完成');
                }
            } else {
                renderSmallGraph(graphData);
            }

            document.getElementById('nodeCount').textContent = graphData.nodes.length;
            document.getElementById('edgeCount').textContent = graphData.edges.length;
            populateNodeSelects();
        }

        function renderSmallGraph(graphData) {
            const elements = [];

            graphData.nodes.forEach(function(node) {
                elements.push({
                    data: {
                        id: node.id,
                        name: node.name,
                        type: node.type,
                        label: node.label
                    }
                });
            });

            graphData.edges.forEach(function(edge) {
                elements.push({
                    data: {
                        id: edge.source + '-' + edge.target,
                        source: edge.source,
                        target: edge.target,
                        relationship: edge.relationship
                    }
                });
            });

            cy.elements().remove();
            cy.add(elements);
            applyLayout();
        }

        async function renderLargeGraph(graphData) {
            return new Promise(function(resolve) {
                const BATCH_SIZE = 100;
                const totalNodes = graphData.nodes.length;
                const totalEdges = graphData.edges.length;
                const totalBatches = Math.ceil(totalNodes / BATCH_SIZE) + Math.ceil(totalEdges / BATCH_SIZE);
                let currentBatch = 0;

                cy.elements().remove();

                function addNodeBatch(startIndex) {
                    const endIndex = Math.min(startIndex + BATCH_SIZE, totalNodes);
                    const batch = [];
                    
                    for (let i = startIndex; i < endIndex; i++) {
                        const node = graphData.nodes[i];
                        batch.push({
                            data: {
                                id: node.id,
                                name: node.name,
                                type: node.type,
                                label: node.label
                            }
                        });
                    }
                    
                    cy.add(batch);
                    currentBatch++;
                    
                    const progress = Math.round((currentBatch / totalBatches) * 100);
                    showProgress(true, progress, '加载节点 ' + endIndex + ' / ' + totalNodes);

                    if (endIndex < totalNodes) {
                        setTimeout(function() { addNodeBatch(endIndex); }, 10);
                    } else {
                        setTimeout(function() { addEdgeBatch(0); }, 10);
                    }
                }

                function addEdgeBatch(startIndex) {
                    const endIndex = Math.min(startIndex + BATCH_SIZE, totalEdges);
                    const batch = [];
                    
                    for (let i = startIndex; i < endIndex; i++) {
                        const edge = graphData.edges[i];
                        batch.push({
                            data: {
                                id: edge.source + '-' + edge.target,
                                source: edge.source,
                                target: edge.target,
                                relationship: edge.relationship
                            }
                        });
                    }
                    
                    cy.add(batch);
                    currentBatch++;
                    
                    const progress = Math.round((currentBatch / totalBatches) * 100);
                    showProgress(true, progress, '加载关系 ' + endIndex + ' / ' + totalEdges);

                    if (endIndex < totalEdges) {
                        setTimeout(function() { addEdgeBatch(endIndex); }, 10);
                    } else {
                        setTimeout(function() {
                            showProgress(true, 95, '应用布局...');
                            setTimeout(function() {
                                applyLayout();
                                showProgress(false, 100, '完成');
                                resolve();
                            }, 200);
                        }, 50);
                    }
                }

                addNodeBatch(0);
            });
        }

        function applyLayout() {
            const nodeCount = cy.nodes().length;
            const animate = renderSettings.enableAnimation && nodeCount <= NODE_WARNING_THRESHOLD;
            const animationDuration = animate ? Math.min(1000, 300 + (nodeCount * 2)) : 0;

            let layout;
            
            if (nodeCount > NODE_DANGER_THRESHOLD && currentLayout === 'cose') {
                layout = cy.layout({
                    name: 'concentric',
                    animate: animate,
                    animationDuration: animationDuration,
                    concentric: function(node) { return node.degree(); },
                    levelWidth: function() { return 2; },
                    padding: 30
                });
            } else if (currentLayout === 'cose') {
                layout = cy.layout({
                    name: 'cose',
                    animate: animate,
                    animationDuration: animationDuration,
                    nodeRepulsion: nodeCount > 200 ? 12000 : 8000,
                    nodeOverlap: 20,
                    idealEdgeLength: nodeCount > 200 ? 200 : 150,
                    edgeElasticity: nodeCount > 200 ? 200 : 100,
                    gravity: 1,
                    randomize: true,
                    componentSpacing: 100,
                    numIter: nodeCount > 200 ? 1000 : 2000,
                    coolingFactor: nodeCount > 200 ? 0.95 : 0.99,
                    minTemp: nodeCount > 200 ? 1.0 : 0.1
                });
            } else if (currentLayout === 'concentric') {
                layout = cy.layout({
                    name: 'concentric',
                    animate: animate,
                    animationDuration: animationDuration,
                    concentric: function(node) { return node.degree(); },
                    levelWidth: function() { return 2; },
                    padding: 30
                });
            } else if (currentLayout === 'breadthfirst') {
                layout = cy.layout({
                    name: 'breadthfirst',
                    animate: animate,
                    animationDuration: animationDuration,
                    directed: false,
                    spacingFactor: 1.5,
                    padding: 30
                });
            } else if (currentLayout === 'circle') {
                layout = cy.layout({
                    name: 'circle',
                    animate: animate,
                    animationDuration: animationDuration,
                    spacingFactor: 1.5,
                    padding: 30
                });
            } else if (currentLayout === 'grid') {
                layout = cy.layout({
                    name: 'grid',
                    animate: animate,
                    animationDuration: animationDuration,
                    padding: 30
                });
            }
            
            layout.run();
        }

        function toggleLayout() {
            const layouts = ['cose', 'concentric', 'breadthfirst', 'circle', 'grid'];
            const currentIndex = layouts.indexOf(currentLayout);
            currentLayout = layouts[(currentIndex + 1) % layouts.length];
            applyLayout();
            showMessage('切换到布局: ' + currentLayout, 'success');
        }

        async function clearGraph() {
            if (!confirm('确定要清空所有图谱数据吗？')) {
                return;
            }

            try {
                const response = await fetch('/api/graph/clear', {
                    method: 'DELETE'
                });
                const data = await response.json();

                if (data.success) {
                    cy.elements().remove();
                    document.getElementById('nodeCount').textContent = '0';
                    document.getElementById('edgeCount').textContent = '0';
                    document.getElementById('entitiesDisplay').style.display = 'none';
                    updatePerformanceIndicator(0, 0);
                    showMessage('图谱已清空', 'success');
                } else {
                    showMessage('清空失败: ' + data.error, 'error');
                }
            } catch (error) {
                showMessage('请求失败: ' + error.message, 'error');
            }
        }

        function zoomIn() {
            cy.zoom(cy.zoom() * 1.2);
        }

        function zoomOut() {
            cy.zoom(cy.zoom() * 0.8);
        }

        function fitGraph() {
            cy.fit(50);
        }

        document.addEventListener('DOMContentLoaded', function() {
            initCytoscape();
            refreshGraph();
        });

        let pathHighlightNodes = [];
        let pathHighlightEdges = [];

        function populateNodeSelects() {
            const sourceSelect = document.getElementById('sourceNode');
            const targetSelect = document.getElementById('targetNode');

            sourceSelect.innerHTML = '<option value="">-- 选择起始节点 --</option>';
            targetSelect.innerHTML = '<option value="">-- 选择目标节点 --</option>';

            if (!cy) return;

            const nodes = cy.nodes();
            const nodeData = [];
            nodes.forEach(function(node) {
                nodeData.push({
                    id: node.id(),
                    name: node.data('name'),
                    type: node.data('type')
                });
            });

            nodeData.sort(function(a, b) {
                const typeOrder = { organization: 0, ip: 1, domain: 2 };
                const typeDiff = (typeOrder[a.type] || 3) - (typeOrder[b.type] || 3);
                if (typeDiff !== 0) return typeDiff;
                return a.name.localeCompare(b.name);
            });

            nodeData.forEach(function(nd) {
                const typeLabel = { ip: 'IP', domain: '域名', organization: '组织' };
                const label = '[' + (typeLabel[nd.type] || nd.type) + '] ' + nd.name;

                const opt1 = document.createElement('option');
                opt1.value = nd.id;
                opt1.textContent = label;
                opt1.dataset.type = nd.type;
                opt1.dataset.name = nd.name;
                sourceSelect.appendChild(opt1);

                const opt2 = document.createElement('option');
                opt2.value = nd.id;
                opt2.textContent = label;
                opt2.dataset.type = nd.type;
                opt2.dataset.name = nd.name;
                targetSelect.appendChild(opt2);
            });
        }

        function clearPathHighlight() {
            if (!cy) return;

            cy.nodes().removeClass('path-node path-dim');
            cy.edges().removeClass('path-edge edge-dim');
            pathHighlightNodes = [];
            pathHighlightEdges = [];

            document.getElementById('pathResult').innerHTML = '';
        }

        async function findShortestPath() {
            const sourceSelect = document.getElementById('sourceNode');
            const targetSelect = document.getElementById('targetNode');
            const resultDiv = document.getElementById('pathResult');

            const sourceOption = sourceSelect.options[sourceSelect.selectedIndex];
            const targetOption = targetSelect.options[targetSelect.selectedIndex];

            if (!sourceSelect.value || !targetSelect.value) {
                resultDiv.innerHTML = '<div class="path-result path-result-notfound">请选择起始和目标节点</div>';
                return;
            }

            if (sourceSelect.value === targetSelect.value) {
                resultDiv.innerHTML = '<div class="path-result path-result-notfound">起始和目标节点不能相同</div>';
                return;
            }

            const sourceType = sourceOption.dataset.type;
            const sourceName = sourceOption.dataset.name;
            const targetType = targetOption.dataset.type;
            const targetName = targetOption.dataset.name;

            resultDiv.innerHTML = '<div class="path-result" style="color: #a0a0a0;">正在查询路径...</div>';

            try {
                const response = await fetch('/api/shortest-path', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        source_name: sourceName,
                        source_type: sourceType,
                        target_name: targetName,
                        target_type: targetType,
                        max_depth: 10
                    })
                });

                const data = await response.json();

                if (data.success && data.found) {
                    highlightPath(data.path);
                    const pathStr = data.path.nodes.map(function(n) { return n.name; }).join(' → ');
                    resultDiv.innerHTML = '<div class="path-result path-result-found">路径长度: ' + data.path.edges.length + ' 步<br/>' + escapeHtml(pathStr) + '</div>';
                } else if (data.success && !data.found) {
                    clearPathHighlight();
                    resultDiv.innerHTML = '<div class="path-result path-result-notfound">未找到连接路径</div>';
                } else {
                    resultDiv.innerHTML = '<div class="path-result path-result-notfound">查询失败: ' + escapeHtml(data.error || '未知错误') + '</div>';
                }
            } catch (error) {
                resultDiv.innerHTML = '<div class="path-result path-result-notfound">请求失败: ' + escapeHtml(error.message) + '</div>';
            }
        }

        function highlightPath(pathData) {
            if (!cy) return;

            cy.nodes().removeClass('path-node path-dim');
            cy.edges().removeClass('path-edge edge-dim');

            if (!cy.style()._private.cssMap || !cy.style()._private.cssMap['node.path-dim']) {
                cy.style().selector('node.path-dim').style({ 'opacity': 0.25 }).update();
                cy.style().selector('edge.edge-dim').style({ 'opacity': 0.1 }).update();
            }

            const pathNodeIds = new Set(pathData.nodes.map(function(n) { return n.id; }));
            const pathEdgeKeys = new Set();
            pathData.edges.forEach(function(e) {
                pathEdgeKeys.add(e.source + '-' + e.target);
                pathEdgeKeys.add(e.target + '-' + e.source);
            });

            cy.nodes().forEach(function(node) {
                if (pathNodeIds.has(node.id())) {
                    node.addClass('path-node');
                } else {
                    node.addClass('path-dim');
                }
            });

            cy.edges().forEach(function(edge) {
                const key1 = edge.source().id() + '-' + edge.target().id();
                const key2 = edge.target().id() + '-' + edge.source().id();
                if (pathEdgeKeys.has(key1) || pathEdgeKeys.has(key2)) {
                    edge.addClass('path-edge');
                } else {
                    edge.addClass('edge-dim');
                }
            });

            const pathNodes = cy.nodes('.path-node');
            if (pathNodes.length > 0) {
                cy.animate({
                    fit: { eles: pathNodes, padding: 80 },
                    duration: 600,
                    easing: 'ease-in-out-cubic'
                });
            }
        }

        function exportGexf() {
            window.location.href = '/api/export/gexf';
        }
    </script>
</body>
</html>
