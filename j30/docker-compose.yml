version: '3.8'

services:
  envoy:
    build:
      context: .
      dockerfile: docker/envoy.Dockerfile
    container_name: ai-gateway-envoy
    ports:
      - "8080:8080"
      - "9901:9901"
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./config/routes.json:/config/routes.json:ro
      - ./models:/models:ro
      - ./wasm/bazel-bin/ai_gateway_filter.wasm:/etc/envoy/ai_gateway_filter.wasm:ro
    depends_on:
      - management-api
      - backend
    networks:
      - ai-gateway-net
    restart: unless-stopped

  management-api:
    build:
      context: .
      dockerfile: docker/management-api.Dockerfile
    container_name: ai-gateway-management-api
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - MODELS_DIR=/models
      - CONFIG_DIR=/config
      - ENVOY_ADMIN_URL=http://envoy:9901
    volumes:
      - ./models:/models
      - ./config:/config
    networks:
      - ai-gateway-net
    restart: unless-stopped

  backend:
    image: nginx:alpine
    container_name: ai-gateway-backend
    ports:
      - "8081:80"
    volumes:
      - ./docker/backend.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ai-gateway-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: ai-gateway-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - ai-gateway-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: ai-gateway-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - ai-gateway-net
    restart: unless-stopped

networks:
  ai-gateway-net:
    driver: bridge

volumes:
  grafana-data:
