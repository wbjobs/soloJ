server {
    listen 80;
    server_name _;

    location /upload {
        add_header Content-Type application/json;
        return 200 '{"status": "received", "message": "Upload processed successfully"}';
    }

    location /analyze {
        add_header Content-Type application/json;
        return 200 '{"status": "analyzed", "message": "Text analysis completed"}';
    }

    location /api/classify {
        add_header Content-Type application/json;
        return 200 '{"status": "classified", "message": "Image classification completed"}';
    }

    location / {
        add_header Content-Type application/json;
        return 200 '{"status": "ok", "service": "backend-service"}';
    }
}
