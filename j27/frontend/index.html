<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Point Cloud Viewer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      background: #1a1a2e;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    .toolbar {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(30, 30, 50, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px;
      color: white;
      min-width: 280px;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .toolbar h3 {
      font-size: 14px;
      margin-bottom: 12px;
      color: #64b5f6;
      font-weight: 600;
    }

    .toolbar-section {
      margin-bottom: 16px;
    }

    .toolbar-section:last-child {
      margin-bottom: 0;
    }

    .toolbar-label {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 6px;
      display: block;
    }

    select, button, input[type="range"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      color: white;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }

    select:hover, button:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #2196f3;
      border-color: #2196f3;
    }

    .btn-primary:hover {
      background: #1976d2;
    }

    .btn-danger {
      background: #f44336;
      border-color: #f44336;
    }

    .btn-danger:hover {
      background: #d32f2f;
    }

    .stats {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(30, 30, 50, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px 16px;
      color: white;
      font-size: 12px;
      z-index: 100;
      backdrop-filter: blur(10px);
      min-width: 200px;
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .stat-item:last-child {
      margin-bottom: 0;
    }

    .stat-label {
      color: #aaa;
    }

    .stat-value {
      color: #64b5f6;
      font-weight: 600;
    }

    .measurement-panel {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: rgba(30, 30, 50, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px;
      color: white;
      min-width: 280px;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .measurement-panel h3 {
      font-size: 14px;
      margin-bottom: 12px;
      color: #4caf50;
      font-weight: 600;
    }

    .measurement-result {
      background: rgba(76, 175, 80, 0.1);
      border: 1px solid rgba(76, 175, 80, 0.3);
      border-radius: 4px;
      padding: 8px 12px;
      margin-top: 8px;
    }

    .measurement-distance {
      font-size: 20px;
      font-weight: 600;
      color: #4caf50;
    }

    .upload-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .upload-modal.active {
      display: flex;
    }

    .upload-content {
      background: #1e1e32;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 24px;
      min-width: 400px;
      color: white;
    }

    .upload-content h2 {
      margin-bottom: 20px;
      color: #64b5f6;
    }

    .drop-zone {
      border: 2px dashed #64b5f6;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .drop-zone:hover, .drop-zone.dragover {
      background: rgba(100, 181, 246, 0.1);
      border-color: #2196f3;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 12px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #2196f3, #64b5f6);
      transition: width 0.3s;
    }

    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(30, 30, 50, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      flex-direction: column;
      color: white;
    }

    .loading-overlay.active {
      display: flex;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #2196f3;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .point-list {
      max-height: 120px;
      overflow-y: auto;
      margin-top: 8px;
    }

    .point-item {
      display: flex;
      justify-content: space-between;
      padding: 4px 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      margin-bottom: 4px;
      font-size: 11px;
    }

    .category-panel {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(30, 30, 50, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px;
      color: white;
      min-width: 200px;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .category-panel h3 {
      font-size: 14px;
      margin-bottom: 12px;
      color: #ff9800;
      font-weight: 600;
    }

    .category-item {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .category-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .category-item input[type="checkbox"] {
      margin-right: 8px;
      cursor: pointer;
    }

    .category-color {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      margin-right: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .category-name {
      flex: 1;
      font-size: 12px;
    }

    .category-count {
      font-size: 11px;
      color: #aaa;
    }

    .annotation-panel {
      position: absolute;
      bottom: 16px;
      right: 16px;
      background: rgba(30, 30, 50, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px;
      color: white;
      width: 280px;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .annotation-panel h3 {
      font-size: 14px;
      margin-bottom: 12px;
      color: #9c27b0;
      font-weight: 600;
    }

    .annotation-list {
      max-height: 150px;
      overflow-y: auto;
      margin-bottom: 12px;
    }

    .annotation-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      margin-bottom: 6px;
    }

    .annotation-info {
      flex: 1;
    }

    .annotation-name {
      font-size: 12px;
      font-weight: 500;
    }

    .annotation-category {
      font-size: 11px;
      color: #aaa;
    }

    .annotation-actions {
      display: flex;
      gap: 4px;
    }

    .annotation-actions button {
      padding: 4px 8px;
      font-size: 10px;
      width: auto;
    }

    .selection-overlay {
      position: absolute;
      border: 2px dashed #ff9800;
      background: rgba(255, 152, 0, 0.1);
      pointer-events: none;
      z-index: 999;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div class="toolbar">
      <h3>Point Cloud Viewer</h3>

      <div class="toolbar-section">
        <label class="toolbar-label">Dataset</label>
        <select id="dataset-select">
          <option value="">Select a dataset...</option>
        </select>
        <button id="upload-btn" style="margin-top: 8px;">Upload LAS File</button>
      </div>

      <div class="toolbar-section">
        <label class="toolbar-label">Coloring Mode</label>
        <select id="coloring-mode">
          <option value="height">Height (Elevation)</option>
          <option value="intensity">Intensity</option>
          <option value="category">Category</option>
          <option value="rgb">RGB</option>
        </select>
      </div>

      <div class="toolbar-section">
        <label class="toolbar-label">Point Size: <span id="point-size-value">2</span></label>
        <input type="range" id="point-size" min="0.5" max="10" step="0.5" value="2">
      </div>

      <div class="toolbar-section">
        <label class="toolbar-label">Max LOD Level: <span id="lod-level-value">Auto</span></label>
        <input type="range" id="lod-level" min="0" max="10" step="1" value="10">
      </div>

      <div class="toolbar-section">
        <label class="toolbar-label">Tools</label>
        <button id="measure-btn">Measure Distance</button>
        <button id="select-btn" style="margin-top: 8px;">Select & Annotate</button>
        <button id="clear-measure-btn" style="margin-top: 8px; display: none;">Clear Measurement</button>
        <button id="reset-view-btn" style="margin-top: 8px;">Reset View</button>
      </div>
    </div>

    <div class="category-panel" id="category-panel">
      <h3>Category Filter</h3>
      <div id="category-list">
        <label class="category-item">
          <input type="checkbox" id="cat-0" checked data-category="0">
          <div class="category-color" style="background: #8c8c8c;"></div>
          <span class="category-name">Ground</span>
        </label>
        <label class="category-item">
          <input type="checkbox" id="cat-1" checked data-category="1">
          <div class="category-color" style="background: #00b400;"></div>
          <span class="category-name">Vegetation</span>
        </label>
        <label class="category-item">
          <input type="checkbox" id="cat-2" checked data-category="2">
          <div class="category-color" style="background: #c86432;"></div>
          <span class="category-name">Building</span>
        </label>
        <label class="category-item">
          <input type="checkbox" id="cat-3" checked data-category="3">
          <div class="category-color" style="background: #ff0000;"></div>
          <span class="category-name">Vehicle</span>
        </label>
        <label class="category-item">
          <input type="checkbox" id="cat-4" checked data-category="4">
          <div class="category-color" style="background: #ffff00;"></div>
          <span class="category-name">Powerline</span>
        </label>
        <label class="category-item">
          <input type="checkbox" id="cat-5" checked data-category="5">
          <div class="category-color" style="background: #964b00;"></div>
          <span class="category-name">Furniture</span>
        </label>
        <label class="category-item">
          <input type="checkbox" id="cat-6" checked data-category="6">
          <div class="category-color" style="background: #ff00ff;"></div>
          <span class="category-name">Others</span>
        </label>
      </div>
      <button id="show-all-btn" style="margin-top: 8px;">Show All</button>
      <button id="hide-all-btn" style="margin-top: 4px;">Hide All</button>
    </div>

    <div class="stats" style="top: 280px;">
      <div class="stat-item">
        <span class="stat-label">Points Rendered:</span>
        <span class="stat-value" id="points-count">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Chunks Loaded:</span>
        <span class="stat-value" id="chunks-count">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Current LOD:</span>
        <span class="stat-value" id="lod-level-display">-</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">FPS:</span>
        <span class="stat-value" id="fps">60</span>
      </div>
    </div>

    <div class="measurement-panel" id="measurement-panel" style="display: none;">
      <h3>Distance Measurement</h3>
      <p style="font-size: 12px; color: #aaa;">Click on the point cloud to set measurement points</p>

      <div class="point-list" id="measurement-points"></div>

      <div class="measurement-result" id="measurement-result" style="display: none;">
        <div style="font-size: 12px; color: #aaa; margin-bottom: 4px;">Distance:</div>
        <div class="measurement-distance" id="distance-value">0.00 m</div>
      </div>
    </div>

    <div class="annotation-panel" id="annotation-panel" style="display: none;">
      <h3>Annotations</h3>
      <div class="annotation-list" id="annotation-list"></div>
      <div id="annotation-form" style="display: none;">
        <input type="text" id="annotation-name" placeholder="Annotation name" style="width: 100%; padding: 8px; margin-bottom: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; color: white;">
        <select id="annotation-category" style="margin-bottom: 8px;">
          <option value="ground">Ground</option>
          <option value="vegetation">Vegetation</option>
          <option value="building">Building</option>
          <option value="vehicle">Vehicle</option>
          <option value="powerline">Powerline</option>
          <option value="furniture">Furniture</option>
          <option value="others">Others</option>
        </select>
        <div style="display: flex; gap: 8px;">
          <button id="save-annotation-btn" class="btn-primary" style="flex: 1;">Save</button>
          <button id="cancel-annotation-btn" style="flex: 1;">Cancel</button>
        </div>
      </div>
    </div>

    <div class="loading-overlay" id="loading-overlay">
      <div class="spinner"></div>
      <div style="margin-top: 16px;" id="loading-text">Loading...</div>
      <div class="progress-bar" style="width: 200px;">
        <div class="progress-fill" id="loading-progress" style="width: 0%;"></div>
      </div>
    </div>

    <div class="upload-modal" id="upload-modal">
      <div class="upload-content">
        <h2>Upload LAS File</h2>
        <div class="drop-zone" id="drop-zone">
          <div style="font-size: 48px; margin-bottom: 16px;">📁</div>
          <div>Drag & drop your LAS file here</div>
          <div style="font-size: 12px; color: #aaa; margin-top: 8px;">or click to browse</div>
          <input type="file" id="file-input" accept=".las,.laz" style="display: none;">
        </div>
        <div id="upload-progress-container" style="display: none; margin-top: 16px;">
          <div style="font-size: 13px; margin-bottom: 8px;" id="upload-status">Uploading...</div>
          <div class="progress-bar">
            <div class="progress-fill" id="upload-progress" style="width: 0%;"></div>
          </div>
        </div>
        <div style="margin-top: 16px; display: flex; gap: 8px;">
          <button id="cancel-upload-btn" style="flex: 1;">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
