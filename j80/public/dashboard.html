<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分布式渲染 - 全球节点实时监控大屏</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #111827;
      --bg-tertiary: #1f2937;
      --accent-primary: #64ffda;
      --accent-secondary: #4cc9f0;
      --accent-tertiary: #8b5cf6;
      --text-primary: #e6f1ff;
      --text-secondary: #8892b0;
      --warning: #f59e0b;
      --error: #f43f5e;
      --success: #10b981;
      --glow-cyan: 0 0 20px rgba(100, 255, 218, 0.5);
      --glow-blue: 0 0 20px rgba(76, 201, 240, 0.5);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      position: relative;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(ellipse at 20% 10%, rgba(100, 255, 218, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 90%, rgba(76, 201, 240, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(139, 92, 246, 0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: -2;
    }
    
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(rgba(100, 255, 218, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100, 255, 218, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: -1;
      animation: gridMove 60s linear infinite;
    }
    
    @keyframes gridMove {
      0% { background-position: 0 0; }
      100% { background-position: 60px 60px; }
    }
    
    .dashboard {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      padding: 1.5rem;
      gap: 1rem;
    }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: linear-gradient(135deg, rgba(17, 24, 39, 0.8), rgba(31, 41, 55, 0.8));
      backdrop-filter: blur(10px);
      border: 1px solid rgba(100, 255, 218, 0.15);
      border-radius: 12px;
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    
    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }
    
    .header-title {
      font-size: 0.85rem;
      color: var(--text-secondary);
      border-left: 1px solid rgba(100, 255, 218, 0.3);
      padding-left: 1rem;
    }
    
    .header-right {
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    
    .live-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: var(--accent-primary);
    }
    
    .live-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--success);
      animation: livePulse 1.5s ease-in-out infinite;
      box-shadow: 0 0 10px var(--success);
    }
    
    @keyframes livePulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.2); }
    }
    
    .current-time {
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    
    .main-content {
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      gap: 1rem;
      overflow: hidden;
    }
    
    .panel {
      background: linear-gradient(135deg, rgba(17, 24, 39, 0.7), rgba(31, 41, 55, 0.7));
      backdrop-filter: blur(10px);
      border: 1px solid rgba(100, 255, 218, 0.15);
      border-radius: 12px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .panel-title {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent-primary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .panel-title .count {
      background: rgba(100, 255, 218, 0.1);
      color: var(--accent-primary);
      padding: 0.125rem 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    
    .stat-card {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(100, 255, 218, 0.1);
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
    }
    
    .stat-value {
      font-family: 'Space Mono', monospace;
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent-primary);
      text-shadow: var(--glow-cyan);
    }
    
    .stat-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
    }
    
    .stat-unit {
      font-size: 0.7rem;
      color: var(--text-secondary);
      opacity: 0.7;
    }
    
    .map-container {
      position: relative;
      flex: 1;
      min-height: 0;
      border-radius: 8px;
      overflow: hidden;
      background: radial-gradient(ellipse at center, rgba(100, 255, 218, 0.05), rgba(15, 23, 42, 0.8);
    }
    
    #worldMap {
      width: 100%;
      height: 100%;
      display: block;
    }
    
    .map-overlay {
      position: absolute;
      top: 1rem;
      left: 1rem;
      right: 1rem;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
    }
    
    .map-legend {
      display: flex;
      gap: 1rem;
      background: rgba(10, 14, 26, 0.9);
      border: 1px solid rgba(100, 255, 218, 0.2);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      font-size: 0.7rem;
      color: var(--text-secondary);
      backdrop-filter: blur(5px);
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    
    .legend-dot.active {
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
      animation: livePulse 1.5s ease-in-out infinite;
    }
    
    .legend-dot.background {
      background: var(--warning);
    }
    
    .node-marker {
      cursor: pointer;
    }
    
    .node-pulse {
      animation: nodePulse 2s ease-in-out infinite;
      transform-origin: center;
    }
    
    @keyframes nodePulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0.3; }
    }
    
    .node-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      fill: var(--text-primary);
      paint-order: stroke;
      stroke: var(--bg-primary);
      stroke-width: 3px;
      stroke-linejoin: round;
      pointer-events: none;
    }
    
    .node-tooltip {
      position: fixed;
      background: rgba(10, 14, 26, 0.95);
      border: 1px solid rgba(100, 255, 218, 0.3);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.8rem;
      pointer-events: none;
      z-index: 100;
      min-width: 180px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    
    .tooltip-title {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      color: var(--accent-primary);
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
    }
    
    .tooltip-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.25rem;
      color: var(--text-secondary);
      font-size: 0.75rem;
    }
    
    .tooltip-value {
      color: var(--text-primary);
      font-family: 'Space Mono', monospace;
    }
    
    .workers-list {
      flex: 1;
      overflow-y: auto;
      margin-right: -0.5rem;
      padding-right: 0.5rem;
    }
    
    .workers-list::-webkit-scrollbar {
      width: 4px;
    }
    
    .workers-list::-webkit-scrollbar-track {
      background: transparent;
    }
    
    .workers-list::-webkit-scrollbar-thumb {
      background: rgba(100, 255, 218, 0.3);
      border-radius: 2px;
    }
    
    .worker-item {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(100, 255, 218, 0.1);
      border-radius: 8px;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .worker-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--success);
    }
    
    .worker-item.background::before {
      background: var(--warning);
    }
    
    .worker-item:hover {
      border-color: rgba(100, 255, 218, 0.3);
      transform: translateX(4px);
    }
    
    .worker-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    
    .worker-id {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: var(--accent-primary);
    }
    
    .worker-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    
    .worker-status.active {
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      animation: livePulse 1.5s ease-in-out infinite;
    }
    
    .worker-status.background {
      background: var(--warning);
      box-shadow: 0 0 6px var(--warning);
    }
    
    .worker-location {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-bottom: 0.375rem;
      display: flex;
      align-items: center;
      gap: 0.375rem;
    }
    
    .worker-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.375rem;
      font-size: 0.7rem;
    }
    
    .worker-stat {
      display: flex;
      justify-content: space-between;
    }
    
    .worker-stat-label {
      color: var(--text-secondary);
    }
    
    .worker-stat-value {
      font-family: 'Space Mono', monospace;
      color: var(--text-primary);
    }
    
    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      overflow: hidden;
    }
    
    .right-panel .panel {
      flex: 1;
      min-height: 0;
    }
    
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1.5rem;
      background: linear-gradient(135deg, rgba(17, 24, 39, 0.8), rgba(31, 41, 55, 0.8));
      backdrop-filter: blur(10px);
      border: 1px solid rgba(100, 255, 218, 0.15);
      border-radius: 12px;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    
    .footer-links {
      display: flex;
      gap: 2rem;
    }
    
    .footer-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .footer-label {
      color: var(--text-secondary);
    }
    
    .footer-value {
      font-family: 'Space Mono', monospace;
      color: var(--accent-primary);
    }
    
    .connection-line {
      stroke: rgba(100, 255, 218, 0.3);
      stroke-width: 1;
      fill: none;
      animation: dash 3s linear infinite;
    }
    
    @keyframes dash {
      to {
        stroke-dashoffset: -20;
      }
    }
    
    .heat-connection {
      pointer-events: none;
    }
    
    .heat-glow {
      filter: blur(8px);
      opacity: 0.6;
    }
    
    @media (max-width: 1400px) {
      .main-content {
        grid-template-columns: 1fr 1.5fr 1fr;
      }
      
      .stat-value {
        font-size: 1.5rem;
      }
    }
    
    @media (max-width: 1024px) {
      .main-content {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr auto;
      }
      
      html, body {
        overflow: auto;
        height: auto;
      }
      
      .dashboard {
        height: auto;
        min-height: 100vh;
      }
      
      .map-container {
        min-height: 400px;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <header>
      <div class="header-left">
        <div class="logo">◈ GLOBAL_RENDER_NETWORK</div>
        <div class="header-title">分布式光线追踪 · 全球节点监控</div>
      </div>
      <div class="header-right">
        <div class="live-indicator">
          <div class="live-dot"></div>
          <span>LIVE</span>
        </div>
        <div class="current-time" id="currentTime">--:--:--</div>
      </div>
    </header>
    
    <div class="main-content">
      <div class="panel">
        <div class="panel-title">
          <span>📊 全局统计</span>
        </div>
        
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="activeWorkers">0</div>
            <div class="stat-label">在线节点</div>
            <div class="stat-unit">台</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="totalCores">0</div>
            <div class="stat-label">总算力</div>
            <div class="stat-unit">核心</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="totalTiles">0</div>
            <div class="stat-label">已完成 Tile</div>
            <div class="stat-unit">块</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="backgroundWorkers">0</div>
            <div class="stat-label">后台运行</div>
            <div class="stat-unit">台</div>
          </div>
        </div>
        
        <div class="panel-title" style="margin-top: 1rem;">
          <span>⚡ 实时任务</span>
        </div>
        
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="jobsRunning">0</div>
            <div class="stat-label">进行中任务</div>
            <div class="stat-unit">个</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="jobsCompleted">0</div>
            <div class="stat-label">已完成任务</div>
            <div class="stat-unit">个</div>
          </div>
          <div class="stat-card" style="grid-column: span 2;">
            <div class="stat-value" id="totalProgress">0%</div>
            <div class="stat-label">总体进度</div>
          </div>
        </div>
      
      <div class="panel" style="display: flex; flex-direction: column;">
        <div class="panel-title">
          <span>🌍 全球节点分布</span>
          <span class="count" id="nodeCount">0 节点</span>
        </div>
        
        <div class="map-container">
          <div class="map-overlay">
            <div class="map-legend">
              <div class="legend-item">
                <div class="legend-dot active"></div>
                <span>活跃</span>
              </div>
              <div class="legend-item">
                <div class="legend-dot background"></div>
                <span>后台</span>
              </div>
            </div>
          </div>
          <svg id="worldMap" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
      </div>
      
      <div class="right-panel">
        <div class="panel">
          <div class="panel-title">
            <span>👥 节点列表</span>
            <span class="count" id="workerCount">0</span>
          </div>
          <div class="workers-list" id="workersList">
            <div style="text-align: center; padding: 2rem 1rem; color: var(--text-secondary);">
              <div style="font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.5;">🔌</div>
              <div>暂无连接的节点</div>
            </div>
          </div>
        </div>
        
        <div class="panel" style="flex: 0 0 auto; max-height: 200px;">
          <div class="panel-title">
            <span>📈 算力排行</span>
          </div>
          <div class="workers-list" id="topWorkers">
            <div style="text-align: center; padding: 2rem 1rem; color: var(--text-secondary);">
              <div>等待数据...</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <footer>
      <div class="footer-links">
        <div class="footer-item">
          <span class="footer-label">服务状态:</span>
          <span class="footer-value" id="serverStatus" style="color: var(--success);">● 在线</span>
        </div>
        <div class="footer-item">
          <span class="footer-label">服务端:</span>
          <span class="footer-value">Node.js + Socket.IO</span>
        </div>
        <div class="footer-item">
          <span class="footer-label">渲染引擎:</span>
          <span class="footer-value">Web Worker 光线追踪</span>
        </div>
        <div class="footer-item">
          <span class="footer-label">累计渲染:</span>
          <span class="footer-value" id="totalTime">0s</span>
        </div>
      </div>
      <div class="footer-item">
        <span class="footer-label">数据刷新:</span>
        <span class="footer-value" id="refreshRate">实时</span>
      </div>
    </footer>
  </div>
  
  <div class="node-tooltip" id="nodeTooltip"></div>
  
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
