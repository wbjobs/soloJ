<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分布式渲染 - 工作节点</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a192f;
      --bg-secondary: #112240;
      --bg-tertiary: #1d3557;
      --accent-primary: #64ffda;
      --accent-secondary: #4cc9f0;
      --text-primary: #e6f1ff;
      --text-secondary: #8892b0;
      --warning: #f59e0b;
      --error: #f43f5e;
      --success: #10b981;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(100, 255, 218, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(76, 201, 240, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
    }
    
    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--accent-primary);
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }
    
    .subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }
    
    .status-panel {
      background: rgba(17, 34, 64, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(100, 255, 218, 0.1);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    
    .connection-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    
    .server-input {
      flex: 1;
      min-width: 200px;
      background: var(--bg-primary);
      border: 1px solid rgba(100, 255, 218, 0.2);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text-primary);
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }
    
    .server-input:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(100, 255, 218, 0.1);
    }
    
    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      color: var(--bg-primary);
      font-weight: 600;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(100, 255, 218, 0.3);
    }
    
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid rgba(100, 255, 218, 0.2);
    }
    
    .btn-secondary:hover {
      background: rgba(100, 255, 218, 0.1);
      border-color: var(--accent-primary);
    }
    
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
    }
    
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text-secondary);
    }
    
    .status-dot.connected {
      background: var(--success);
      animation: pulse 2s ease-in-out infinite;
    }
    
    .status-dot.connecting {
      background: var(--warning);
      animation: pulse 1s ease-in-out infinite;
    }
    
    .status-dot.disconnected {
      background: var(--error);
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.1); }
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    
    .stat-card {
      background: var(--bg-secondary);
      border: 1px solid rgba(100, 255, 218, 0.1);
      border-radius: 10px;
      padding: 1.25rem;
      text-align: center;
      transition: all 0.3s ease;
    }
    
    .stat-card:hover {
      border-color: rgba(100, 255, 218, 0.3);
      transform: translateY(-2px);
    }
    
    .stat-value {
      font-family: 'Space Mono', monospace;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--accent-primary);
      margin-bottom: 0.25rem;
    }
    
    .stat-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .progress-section {
      margin-bottom: 1.5rem;
    }
    
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    
    .progress-title {
      font-weight: 500;
      color: var(--text-primary);
    }
    
    .progress-percent {
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      color: var(--accent-primary);
    }
    
    .progress-bar {
      height: 8px;
      background: var(--bg-primary);
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid rgba(100, 255, 218, 0.1);
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
      border-radius: 4px;
      transition: width 0.3s ease;
      width: 0%;
    }
    
    .ring-container {
      display: flex;
      justify-content: center;
      margin: 1.5rem 0;
    }
    
    .progress-ring {
      transform: rotate(-90deg);
    }
    
    .progress-ring-circle-bg {
      fill: none;
      stroke: var(--bg-primary);
      stroke-width: 8;
    }
    
    .progress-ring-circle {
      fill: none;
      stroke: url(#gradient);
      stroke-width: 8;
      stroke-linecap: round;
      stroke-dasharray: 251.2;
      stroke-dashoffset: 251.2;
      transition: stroke-dashoffset 0.3s ease;
    }
    
    .ring-text {
      text-anchor: middle;
      dominant-baseline: middle;
      fill: var(--accent-primary);
      font-family: 'Space Mono', monospace;
      font-size: 1.25rem;
      font-weight: 700;
    }
    
    .ring-subtext {
      text-anchor: middle;
      dominant-baseline: middle;
      fill: var(--text-secondary);
      font-size: 0.7rem;
    }
    
    .preview-section {
      background: var(--bg-secondary);
      border: 1px solid rgba(100, 255, 218, 0.1);
      border-radius: 12px;
      padding: 1.5rem;
    }
    
    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    
    .preview-title {
      font-weight: 500;
      font-size: 1rem;
    }
    
    .tile-info {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-secondary);
      background: var(--bg-primary);
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
    }
    
    .canvas-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
      background: var(--bg-primary);
      border-radius: 8px;
      padding: 1rem;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    #tileCanvas {
      image-rendering: pixelated;
      border-radius: 4px;
      max-width: 100%;
      height: auto;
      border: 1px solid rgba(100, 255, 218, 0.1);
    }
    
    .idle-state {
      text-align: center;
      color: var(--text-secondary);
      padding: 2rem;
    }
    
    .idle-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }
    
    .current-task {
      margin-top: 1rem;
      padding: 1rem;
      background: var(--bg-primary);
      border-radius: 8px;
      border-left: 3px solid var(--accent-primary);
    }
    
    .task-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 0.25rem;
    }
    
    .task-value {
      font-family: 'Space Mono', monospace;
      color: var(--accent-primary);
      font-size: 0.9rem;
    }
    
    @media (max-width: 600px) {
      .container {
        padding: 1rem;
      }
      
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .connection-row {
        flex-direction: column;
        align-items: stretch;
      }
      
      .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">◈ RENDER_WORKER</div>
      <div class="subtitle">分布式光线追踪计算节点</div>
    </header>
    
    <div class="status-panel">
      <div class="connection-row">
        <input 
          type="text" 
          id="serverUrl" 
          class="server-input" 
          placeholder="http://localhost:3000"
          value="http://localhost:3000"
        >
        <button class="btn btn-primary" id="connectBtn">
          <span id="connectIcon">🔌</span>
          <span id="connectText">连接服务端</span>
        </button>
      </div>
      
      <div class="status-indicator">
        <div class="status-dot disconnected" id="statusDot"></div>
        <span id="statusText">未连接</span>
      </div>
    </div>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="tilesCompleted">0</div>
        <div class="stat-label">已完成 Tile</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalTime">0s</div>
        <div class="stat-label">累计渲染时间</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="avgSpeed">-</div>
        <div class="stat-label">平均速度</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="workerCores">-</div>
        <div class="stat-label">CPU 核心</div>
      </div>
    </div>
    
    <div class="progress-section">
      <div class="progress-header">
        <span class="progress-title">当前任务进度</span>
        <span class="progress-percent" id="taskProgress">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
    
    <div class="ring-container">
      <svg class="progress-ring" width="140" height="140" viewBox="0 0 100 100">
        <defs>
          <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#64ffda"/>
            <stop offset="100%" stop-color="#4cc9f0"/>
          </linearGradient>
        </defs>
        <circle class="progress-ring-circle-bg" cx="50" cy="50" r="40"/>
        <circle class="progress-ring-circle" id="ringCircle" cx="50" cy="50" r="40"/>
        <text class="ring-text" x="50" y="47" id="ringText">0%</text>
        <text class="ring-subtext" x="50" y="62" id="ringSubtext">等待任务</text>
      </svg>
    </div>
    
    <div class="preview-section">
      <div class="preview-header">
        <span class="preview-title">实时渲染预览</span>
        <span class="tile-info" id="tileInfo">无任务</span>
      </div>
      <div class="canvas-wrapper" id="canvasWrapper">
        <div class="idle-state" id="idleState">
          <div class="idle-icon">⏳</div>
          <div>等待服务端分配任务...</div>
        </div>
        <canvas id="tileCanvas" style="display: none;"></canvas>
      </div>
      
      <div class="current-task" id="currentTask" style="display: none;">
        <div class="task-label">当前 Tile</div>
        <div class="task-value" id="currentTileInfo">—</div>
      </div>
    </div>
  </div>
  
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/worker.js"></script>
</body>
</html>
