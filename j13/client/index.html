<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collab 3D Review - Real-time Model Review Platform</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <div id="login-screen" class="screen active">
      <div class="login-container">
        <h1>Collab 3D Review</h1>
        <p class="subtitle">Real-time Multi-User 3D Model Review Platform</p>
        <div class="form-group">
          <label for="roomId">Room ID</label>
          <input type="text" id="roomId" placeholder="Enter room ID or leave empty for new room">
        </div>
        <div class="form-group">
          <label for="roomName">Room Name (for new room)</label>
          <input type="text" id="roomName" placeholder="My Review Session">
        </div>
        <div class="form-group">
          <label for="userName">Your Name</label>
          <input type="text" id="userName" placeholder="Enter your name">
        </div>
        <div class="form-group">
          <label for="modelUrl">Model URL (glTF/GLB)</label>
          <input type="text" id="modelUrl" placeholder="https://example.com/model.glb">
        </div>
        <div class="form-group">
          <label for="userRole">Role</label>
          <select id="userRole">
            <option value="host">Host</option>
            <option value="viewer">Viewer</option>
          </select>
        </div>
        <button id="joinBtn" class="btn-primary">Join Room</button>
        <p id="loginError" class="error-msg"></p>
      </div>
    </div>

    <div id="review-screen" class="screen">
      <div id="topbar">
        <div class="topbar-left">
          <span class="room-name" id="currentRoomName">Room</span>
          <span class="room-id" id="currentRoomId"></span>
        </div>
        <div class="topbar-center">
          <button id="lockViewBtn" class="btn-icon" title="Lock View for All">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </button>
          <button id="unlockViewBtn" class="btn-icon hidden" title="Unlock View">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
          </button>
          <button id="exportPdfBtn" class="btn-icon" title="Export PDF Report">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          </button>
          <button id="fullscreenBtn" class="btn-icon" title="Fullscreen">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
          </button>
        </div>
        <div class="topbar-right">
          <span class="user-badge" id="currentUserBadge"></span>
          <button id="leaveBtn" class="btn-secondary">Leave</button>
        </div>
      </div>

      <div id="main-container">
        <div id="viewer-panel">
          <div id="three-canvas"></div>
          <div id="viewer-overlay">
            <div id="view-locked-banner" class="hidden">
              <span>View locked by <strong id="lockedBy"></strong></span>
              <button id="forceUnlockBtn" class="btn-small">Force Unlock</button>
            </div>
            <div id="cursor-overlay"></div>
          </div>
        </div>

        <div id="sidebar">
          <div class="sidebar-section">
            <h3>Participants</h3>
            <div id="userList" class="user-list"></div>
          </div>

          <div class="sidebar-section">
            <h3>Annotations</h3>
            <div class="annotation-controls">
              <button id="addAnnotationBtn" class="btn-primary btn-small">Add Annotation</button>
              <button id="recordBtn" class="btn-secondary btn-small">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                Voice Note
              </button>
            </div>
            <div id="annotationList" class="annotation-list"></div>
          </div>

          <div id="recordingPanel" class="sidebar-section hidden">
            <h3>Recording Voice Note</h3>
            <div class="recording-indicator">
              <span class="recording-dot"></span>
              <span id="recordingTime">00:00</span>
            </div>
            <div class="recording-controls">
              <button id="stopRecordingBtn" class="btn-primary btn-small">Stop & Save</button>
              <button id="cancelRecordingBtn" class="btn-secondary btn-small">Cancel</button>
            </div>
          </div>
        </div>
      </div>

      <div id="annotation-modal" class="modal hidden">
        <div class="modal-content">
          <h3>Add Annotation</h3>
          <p class="modal-hint">Click on the model to place the annotation point</p>
          <div class="form-group">
            <label>Annotation Text</label>
            <textarea id="annotationText" rows="3" placeholder="Enter your annotation..."></textarea>
          </div>
          <div class="modal-actions">
            <button id="saveAnnotationBtn" class="btn-primary">Save Annotation</button>
            <button id="cancelAnnotationBtn" class="btn-secondary">Cancel</button>
          </div>
        </div>
      </div>

      <div id="export-modal" class="modal hidden">
        <div class="modal-content">
          <h3>Export Annotations</h3>
          <div class="export-options">
            <button id="exportPdfOption" class="btn-primary">Export as PDF</button>
            <button id="exportJsonOption" class="btn-secondary">Export as JSON</button>
          </div>
          <div class="modal-actions">
            <button id="closeExportModal" class="btn-secondary">Close</button>
          </div>
        </div>
      </div>

      <div id="replay-banner" class="replay-banner hidden">
        <span>⏮ 回放模式 - Seq <span id="replay-seq">0</span> / <span id="replay-max-seq">0</span></span>
        <button id="exit-replay-btn">退出回放</button>
      </div>

      <div id="timeline-container"></div>

      <button id="toggle-timeline" class="hidden">⏱ 时间轴</button>
    </div>
  </div>

  <script src="https://unpkg.com/socket.io-client@4.7.2/dist/socket.io.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
