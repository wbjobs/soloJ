<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 协作绘图</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="container"></div>
  
  <div class="ui-panel">
    <h2>3D 协作绘图</h2>
    
    <div class="room-section">
      <label for="roomId">房间 ID:</label>
      <input type="text" id="roomId" value="default" placeholder="输入房间 ID">
      <button id="joinBtn">加入房间</button>
    </div>
    
    <div class="user-info">
      <span>状态: </span><span id="status">未连接</span>
    </div>
    
    <div class="user-info">
      <span>我的颜色: </span>
      <div id="myColor" class="color-preview"></div>
    </div>
    
    <div class="user-info">
      <span>在线用户: </span>
      <span id="userCount">0</span>
    </div>
    
    <div class="model-section">
      <label for="modelUpload">上传 .gltf 模型:</label>
      <input type="file" id="modelUpload" accept=".gltf,.glb">
    </div>
    
    <div class="button-group">
      <button id="clearBtn" class="danger">清除全部</button>
      <button id="resetViewBtn" class="secondary">重置视角</button>
      <button id="vrBtn" class="vr">进入 VR 模式</button>
    </div>
    
    <div class="instructions">
      <p><strong>操作说明:</strong></p>
      <p>• 鼠标左键在平面上拖拽绘制线条</p>
      <p>• 鼠标左键拖拽模型可移动</p>
      <p>• 鼠标悬停模型上滚轮可缩放</p>
      <p>• 鼠标右键拖拽旋转视角</p>
      <p>• 滚轮缩放视角</p>
    </div>
  </div>
  
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
