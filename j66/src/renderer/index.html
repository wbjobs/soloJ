<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>笔记应用</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>📝 笔记</h1>
        <button id="newNoteBtn" class="btn btn-primary" title="新建笔记">+</button>
      </div>
      
      <div class="folder-section">
        <div class="folder-header">
          <span>📁 文件夹</span>
          <button id="newFolderBtn" class="btn-icon" title="新建文件夹">+</button>
        </div>
        <div id="folderList" class="folder-list">
        </div>
      </div>

      <div class="notes-section">
        <div class="notes-header">
          <span>📄 笔记列表</span>
          <input type="text" id="searchInput" class="search-input" placeholder="搜索笔记...">
        </div>
        <div id="noteList" class="note-list">
        </div>
      </div>

      <div class="sidebar-footer">
        <button id="syncBtn" class="btn btn-secondary">☁️ 同步到云端</button>
        <span id="syncStatus" class="sync-status"></span>
      </div>
    </div>

    <div class="editor-container">
      <div class="editor-header">
        <div class="note-info">
          <input type="text" id="noteTitle" class="note-title-input" placeholder="笔记标题">
          <div class="note-meta">
            <span id="noteDate"></span>
            <span id="syncIndicator" class="sync-indicator"></span>
          </div>
        </div>
        <div class="editor-actions">
          <button id="saveBtn" class="btn btn-primary">💾 保存</button>
          <button id="deleteBtn" class="btn btn-danger">🗑️ 删除</button>
          <div class="editor-mode-toggle">
            <button id="editModeBtn" class="btn-mode active">编辑</button>
            <button id="previewModeBtn" class="btn-mode">预览</button>
            <button id="splitModeBtn" class="btn-mode">分屏</button>
          </div>
        </div>
      </div>

      <div class="editor-wrapper">
        <div id="editorPane" class="editor-pane">
          <textarea id="editor" class="editor-textarea" placeholder="开始编写你的笔记...

支持 Markdown 语法：
# 标题
## 二级标题
- 列表项
**粗体** *斜体*
`代码`"></textarea>
        </div>
        <div id="previewPane" class="preview-pane">
          <div id="preview" class="markdown-preview"></div>
        </div>
      </div>

      <div class="tags-section">
        <span>🏷️ 标签：</span>
        <div id="tagsContainer" class="tags-container"></div>
        <input type="text" id="tagInput" class="tag-input" placeholder="添加标签后按 Enter">
      </div>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <h3 id="modalTitle">新建文件夹</h3>
      <input type="text" id="modalInput" class="modal-input" placeholder="文件夹名称">
      <div class="modal-actions">
        <button id="modalCancel" class="btn btn-secondary">取消</button>
        <button id="modalConfirm" class="btn btn-primary">确定</button>
      </div>
    </div>
  </div>

  <div id="conflictModal" class="modal">
    <div class="modal-content conflict-modal">
      <h3>⚠️ 版本冲突</h3>
      <p class="conflict-message">该笔记已被其他窗口修改，请选择如何处理：</p>
      <div class="conflict-compare">
        <div class="conflict-col">
          <h4>您的版本</h4>
          <div id="clientVersionPreview" class="conflict-preview"></div>
        </div>
        <div class="conflict-col">
          <h4>服务器版本</h4>
          <div id="serverVersionPreview" class="conflict-preview"></div>
        </div>
      </div>
      <div class="modal-actions">
        <button id="conflictCancel" class="btn btn-secondary">取消</button>
        <button id="conflictUseServer" class="btn btn-secondary">使用服务器版本</button>
        <button id="conflictOverwrite" class="btn btn-primary">覆盖服务器版本</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.2/dist/markdown-it.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
