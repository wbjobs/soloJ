<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分布式粒子势能计算 - 仪表盘</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .header .status {
            font-size: 1.1em;
            color: #888;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .overall-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
        }
        
        .stat-card .label {
            font-size: 0.9em;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .stat-card.active {
            border-color: #00d4ff;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(0, 212, 255, 0); }
        }
        
        .progress-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
        }
        
        .progress-section h2 {
            margin-bottom: 20px;
            color: #fff;
            font-size: 1.5em;
        }
        
        .overall-progress {
            margin-bottom: 20px;
        }
        
        .overall-progress-bar {
            width: 100%;
            height: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }
        
        .overall-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border-radius: 15px;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9em;
            color: #fff;
        }
        
        .workers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .worker-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }
        
        .worker-card.busy {
            border-color: #ffa500;
            background: rgba(255, 165, 0, 0.05);
        }
        
        .worker-card.idle {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.05);
        }
        
        .worker-card.dead {
            border-color: #ff4444;
            background: rgba(255, 68, 68, 0.05);
            opacity: 0.6;
        }
        
        .worker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .worker-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #fff;
        }
        
        .worker-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .worker-status.busy {
            background: #ffa500;
            color: #000;
        }
        
        .worker-status.idle {
            background: #00ff88;
            color: #000;
        }
        
        .worker-status.dead {
            background: #ff4444;
            color: #fff;
        }
        
        .worker-metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .metric {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 8px;
        }
        
        .metric .metric-label {
            font-size: 0.75em;
            color: #888;
            margin-bottom: 4px;
        }
        
        .metric .metric-value {
            font-size: 1.1em;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .worker-progress {
            margin-top: 10px;
        }
        
        .worker-progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            margin-bottom: 5px;
            color: #aaa;
        }
        
        .worker-progress-bar {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
        }
        
        .worker-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffa500, #ff6600);
            border-radius: 6px;
            transition: width 0.2s ease;
        }
        
        .worker-progress-fill.completed {
            background: linear-gradient(90deg, #00ff88, #00cc66);
        }
        
        .speed-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85em;
            margin-top: 10px;
        }
        
        .speed-bar {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .speed-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #7b2cbf, #00d4ff);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        
        .charts-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }
        
        .chart-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
        }
        
        .chart-container h3 {
            margin-bottom: 15px;
            color: #fff;
        }
        
        .controls {
            text-align: center;
            margin-top: 30px;
            margin-bottom: 30px;
        }
        
        .btn {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: #fff;
            border: none;
            padding: 12px 30px;
            font-size: 1.1em;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 10px;
            font-weight: bold;
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        @media (max-width: 768px) {
            .charts-section {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚛️ 分布式粒子势能计算系统</h1>
            <div class="status" id="system-status">等待连接...</div>
        </div>
        
        <div class="controls">
            <button class="btn" onclick="startComputation()" id="start-btn">🚀 开始计算</button>
            <button class="btn" onclick="startComputationWithSeed(42)" id="seed-btn">🎲 固定种子计算</button>
        </div>
        
        <div class="overall-stats">
            <div class="stat-card" id="stat-active">
                <div class="label">计算状态</div>
                <div class="value" id="computing-status">空闲</div>
            </div>
            <div class="stat-card">
                <div class="label">总粒子对数</div>
                <div class="value" id="total-pairs">0</div>
            </div>
            <div class="stat-card">
                <div class="label">已完成对数</div>
                <div class="value" id="completed-pairs">0</div>
            </div>
            <div class="stat-card">
                <div class="label">已用时间</div>
                <div class="value" id="elapsed-time">0.0s</div>
            </div>
            <div class="stat-card">
                <div class="label">在线Worker</div>
                <div class="value" id="worker-count">0</div>
            </div>
        </div>
        
        <div class="progress-section">
            <h2>📊 总体进度</h2>
            <div class="overall-progress">
                <div class="overall-progress-bar">
                    <div class="overall-progress-fill" id="overall-progress" style="width: 0%">
                        0%
                    </div>
                </div>
            </div>
        </div>
        
        <div class="progress-section">
            <h2>👷 Worker 节点状态</h2>
            <div class="workers-grid" id="workers-grid">
            </div>
        </div>
        
        <div class="charts-section">
            <div class="chart-container">
                <h3>📈 任务分配分布</h3>
                <canvas id="assignmentChart"></canvas>
            </div>
            <div class="chart-container">
                <h3>⚡ Worker 速度对比</h3>
                <canvas id="speedChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        
        let assignmentChart, speedChart;
        let lastData = null;
        
        function initCharts() {
            const assignmentCtx = document.getElementById('assignmentChart').getContext('2d');
            const speedCtx = document.getElementById('speedChart').getContext('2d');
            
            assignmentChart = new Chart(assignmentCtx, {
                type: 'doughnut',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        backgroundColor: [
                            '#00d4ff',
                            '#7b2cbf',
                            '#ffa500',
                            '#00ff88',
                            '#ff6b6b',
                            '#4ecdc4',
                            '#45b7d1',
                            '#96ceb4'
                        ],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: { color: '#e0e0e0' }
                        }
                    }
                }
            });
            
            speedChart = new Chart(speedCtx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        label: '速度评分',
                        data: [],
                        backgroundColor: 'rgba(0, 212, 255, 0.7)',
                        borderColor: '#00d4ff',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: '#888' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        x: {
                            ticks: { color: '#888' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }
        
        function updateCharts(data) {
            const workerIds = data.workers.map(w => w.worker_id);
            const chunkSizes = data.workers.map(w => w.current_chunk_size || 0);
            const speedScores = data.workers.map(w => w.speed_score || 0);
            
            assignmentChart.data.labels = workerIds;
            assignmentChart.data.datasets[0].data = chunkSizes;
            assignmentChart.update('none');
            
            speedChart.data.labels = workerIds;
            speedChart.data.datasets[0].data = speedScores;
            speedChart.update('none');
        }
        
        function updateUI(data) {
            lastData = data;
            
            document.getElementById('system-status').textContent = '🟢 已连接 - 实时更新中';
            
            const computing = data.computation.active;
            const statActive = document.getElementById('stat-active');
            const computingStatus = document.getElementById('computing-status');
            
            if (computing) {
                statActive.classList.add('active');
                computingStatus.textContent = '计算中...';
                computingStatus.style.color = '#ffa500';
            } else {
                statActive.classList.remove('active');
                computingStatus.textContent = '空闲';
                computingStatus.style.color = '#00ff88';
            }
            
            document.getElementById('total-pairs').textContent = data.computation.total_pairs.toLocaleString();
            document.getElementById('completed-pairs').textContent = data.computation.completed_pairs.toLocaleString();
            document.getElementById('elapsed-time').textContent = data.computation.elapsed_time.toFixed(1) + 's';
            document.getElementById('worker-count').textContent = data.workers.length;
            
            const totalPairs = data.computation.total_pairs || 1;
            const completedPairs = data.computation.completed_pairs;
            const overallPercent = Math.round((completedPairs / totalPairs) * 100);
            
            const progressFill = document.getElementById('overall-progress');
            progressFill.style.width = overallPercent + '%';
            progressFill.textContent = overallPercent + '%';
            
            updateWorkerCards(data);
            updateCharts(data);
            
            document.getElementById('start-btn').disabled = computing;
            document.getElementById('seed-btn').disabled = computing;
        }
        
        function updateWorkerCards(data) {
            const grid = document.getElementById('workers-grid');
            
            if (data.workers.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #888; padding: 40px;">等待Worker节点连接...</div>';
                return;
            }
            
            grid.innerHTML = data.workers.map(worker => {
                const state = worker.state;
                const chunkSize = worker.current_chunk_size || 0;
                const progress = worker.current_chunk_progress || 0;
                const percent = chunkSize > 0 ? Math.round((progress / chunkSize) * 100) : 0;
                const completed = worker.current_chunk_size > 0 && progress >= chunkSize;
                const speedPercent = Math.min(100, (worker.speed_score || 0) * 50);
                const avgTime = worker.avg_time_per_pair;
                const avgTimeStr = avgTime ? (avgTime * 1000).toFixed(3) + 'ms' : 'N/A';
                
                return `
                <div class="worker-card ${state}">
                    <div class="worker-header">
                        <div class="worker-name">${worker.worker_id}</div>
                        <div class="worker-status ${state}">${state === 'busy' ? '计算中' : state === 'idle' ? '空闲' : '离线'}</div>
                    </div>
                    <div class="worker-metrics">
                        <div class="metric">
                            <div class="metric-label">分配任务量</div>
                            <div class="metric-value">${chunkSize.toLocaleString()}</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">已处理</div>
                            <div class="metric-value">${progress.toLocaleString()}</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">平均耗时/对</div>
                            <div class="metric-value" style="font-size: 0.9em;">${avgTimeStr}</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">总处理量</div>
                            <div class="metric-value">${worker.total_pairs_processed.toLocaleString()}</div>
                        </div>
                    </div>
                    ${chunkSize > 0 ? `
                    <div class="worker-progress">
                        <div class="worker-progress-label">
                            <span>计算进度</span>
                            <span>${percent}%</span>
                        </div>
                        <div class="worker-progress-bar">
                            <div class="worker-progress-fill ${completed ? 'completed' : ''}" style="width: ${percent}%"></div>
                        </div>
                    </div>
                    ` : ''}
                    <div class="speed-indicator">
                        <span>⚡</span>
                        <div class="speed-bar">
                            <div class="speed-bar-fill" style="width: ${speedPercent}%"></div>
                        </div>
                        <span>${(worker.speed_score || 0).toFixed(1)}</span>
                    </div>
                </div>
                `;
            }).join('');
        }
        
        socket.on('status_update', function(data) {
            updateUI(data);
        });
        
        socket.on('connect', function() {
            document.getElementById('system-status').textContent = '🟢 已连接 - 等待数据...';
        });
        
        socket.on('disconnect', function() {
            document.getElementById('system-status').textContent = '🔴 已断开连接';
        });
        
        function startComputation() {
            fetch('/compute')
                .then(response => response.json())
                .then(data => {
                    console.log('Computation result:', data);
                    alert('计算完成！\n总势能: ' + data.total_potential.toFixed(6) + 
                          '\n耗时: ' + data.elapsed_time_seconds.toFixed(2) + '秒');
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('计算失败: ' + error.message);
                });
        }
        
        function startComputationWithSeed(seed) {
            fetch('/compute_with_seed', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ seed: seed })
            })
                .then(response => response.json())
                .then(data => {
                    console.log('Computation result:', data);
                    alert('计算完成！(种子: ' + seed + ')\n总势能: ' + data.total_potential.toFixed(6) + 
                          '\n耗时: ' + data.elapsed_time_seconds.toFixed(2) + '秒');
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('计算失败: ' + error.message);
                });
        }
        
        initCharts();
    </script>
</body>
</html>
