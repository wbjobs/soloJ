version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - mmorpg_net

  cassandra:
    image: cassandra:4.1
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=mmorpg_cluster
      - CASSANDRA_DC=datacenter1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - mmorpg_net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - mmorpg_net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 72
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 8
      KAFKA_COMPRESSION_TYPE: lz4
      KAFKA_MESSAGE_MAX_BYTES: 1048576
    volumes:
      - kafka_data:/var/lib/kafka/data
    depends_on:
      - zookeeper
    networks:
      - mmorpg_net

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - kafka
    command: |
      bash -c '
        echo "Waiting for Kafka to be ready..."
        cub kafka-ready -b kafka:9092 1 30
        echo "Creating topics..."
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 8 --replication-factor 1 --topic combat-events
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 8 --replication-factor 1 --topic movement-events
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 8 --replication-factor 1 --topic skill-events
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 8 --replication-factor 1 --topic buff-events
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 8 --replication-factor 1 --topic death-events
        echo "Topics created successfully."
      '
    networks:
      - mmorpg_net

  collision_service:
    build:
      context: ./collision_service
      dockerfile: Dockerfile
    ports:
      - "50051:50051"
      - "8080:8080"
    environment:
      - REDIS_HOST=redis:6379
      - STATE_SERVICE_HOST=state_service:50052
      - FRAME_RATE=60
      - MAX_UNITS=2000
      - ONNX_MODEL_PATH=/app/models/skill_predictor.onnx
      - PREDICTION_ENABLED=true
    volumes:
      - ./prediction_service/models:/app/models:ro
    depends_on:
      - redis
    networks:
      - mmorpg_net

  damage_arbiter:
    build:
      context: ./damage_arbiter
      dockerfile: Dockerfile
    ports:
      - "50053:50053"
    environment:
      - LUA_SCRIPT_PATH=/app/scripts
      - STATE_SERVICE_HOST=state_service:50052
    depends_on:
      - redis
    networks:
      - mmorpg_net

  state_service:
    build:
      context: ./state_service
      dockerfile: Dockerfile
    ports:
      - "50052:50052"
    environment:
      - REDIS_HOST=redis:6379
      - CASSANDRA_HOST=cassandra
      - CASSANDRA_KEYSPACE=mmorpg
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_ENABLED=true
    depends_on:
      - redis
      - cassandra
      - kafka
    networks:
      - mmorpg_net

  replay_service:
    build:
      context: ./replay_service
      dockerfile: Dockerfile
    ports:
      - "50054:50054"
    environment:
      - KAFKA_BROKERS=kafka:9092
      - CASSANDRA_HOST=cassandra
      - REDIS_HOST=redis:6379
      - CHEAT_DETECTION_INTERVAL=1800
    depends_on:
      - kafka
      - cassandra
      - redis
    networks:
      - mmorpg_net

  prediction_service:
    build:
      context: ./prediction_service
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - ONNX_MODEL_PATH=/app/models/skill_predictor.onnx
    volumes:
      - ./prediction_service/models:/app/models:ro
    networks:
      - mmorpg_net

volumes:
  redis_data:
  cassandra_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:

networks:
  mmorpg_net:
    driver: bridge
